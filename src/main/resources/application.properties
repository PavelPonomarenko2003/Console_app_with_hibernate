# --- General Server Settings ---
server.port=${SERVER_PORT:8080}

# --- PostgreSQL Connection ---
# Using environment variables to easily switch between localhost and Docker
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:user_service}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false 
spring.jpa.properties.hibernate.format_sql=true

# Modern dialect (Hibernate will automatically select the right one if you leave it to just PostgreSQL)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- Logging ---
logging.level.com.example=DEBUG


# It's better to leave SQL logs at the INFO or DEBUG level, TRACE slows down the system too much
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# --- Kafka Common ---
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# --- Kafka Producer ---
# include idempotence
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true

# --- Kafka Consumer ---
spring.kafka.consumer.group-id=user-service-group
spring.kafka.consumer.auto-offset-reset=earliest

# Deserialization with "sent messages" also if we get some problems with adding incorrect data
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

# For deserializers and serializers
spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# Settings JSON (Security and mapping)
spring.kafka.consumer.properties.spring.json.trusted.packages=*
# true because of type headers
spring.kafka.consumer.properties.spring.json.use.type.headers=true

# Fallback class if headers are empty
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.dto.UserNotificationEventDTO

# --- Actuator (Monitoring) ---
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

server.error.include-message=always
server.error.include-exception=true
