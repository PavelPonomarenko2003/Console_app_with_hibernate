version: '3.8'

services:
  # Настройка базы данных
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: user_service
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Java-приложение
  app:
    build: .
    container_name: user_service_container
    depends_on:
      - db
    environment:
      # Эти данные должны совпадать с hibernate.cfg.xml или application.properties
      JDBC_URL: jdbc:postgresql://db:5432/user_service
      JDBC_USER: postgres
      JDBC_PASSWORD: root

volumes:
  postgres_data: